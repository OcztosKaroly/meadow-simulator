name: Bug report
description: Something is broken
title: "[BUG] "
labels: ["type: bug", "status: todo"]

body:
  - type: textarea
    id: bug
    attributes:
      label: What happened?
      description: Describe the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Unity Editor
        - Build (Windows)
        - Build (Linux)
        - Python backend
